<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西小 読み聞かせ記録ノート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f3f0ff;
      color: #2d1f6e;
      min-height: 100vh;
      padding: 28px 20px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .title-block h1 {
      font-size: 1.45rem;
      letter-spacing: 0.08em;
      color: #6d28d9;
    }
    .title-block p {
      font-size: 0.78rem;
      color: #7c6fa0;
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1.5px solid #7c3aed;
      background: #fff;
      color: #7c3aed;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #ede9fe; }

    a.form-link {
      padding: 7px 16px;
      border-radius: 8px;
      background: #7c3aed;
      color: #fff;
      font-size: 0.82rem;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s;
    }
    a.form-link:hover { background: #6d28d9; }

    /* How-to */
    details#howto {
      background: #fff;
      border: 1px solid #ddd6fe;
      border-left: 4px solid #7c3aed;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      line-height: 1.9;
      color: #4c3a8a;
    }
    details#howto summary {
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: bold;
      color: #6d28d9;
      list-style: none;
    }
    details#howto summary::before { content: '▶ '; }
    details#howto[open] summary::before { content: '▼ '; }
    details#howto ol { padding-left: 1.4em; margin-top: 10px; }
    details#howto li { margin-bottom: 6px; }
    details#howto code {
      background: #ede9fe;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.88em;
      color: #7c3aed;
    }
    details#howto a { color: #7c3aed; }

    /* Filter bar */
    #filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    #search {
      flex: 1;
      min-width: 180px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid #c4b5fd;
      background: #fff;
      color: #2d1f6e;
      font-size: 0.88rem;
      outline: none;
    }
    #search:focus { border-color: #7c3aed; }

    .grade-btn {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid #c4b5fd;
      background: #fff;
      color: #7c6fa0;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .grade-btn:hover { border-color: #7c3aed; color: #6d28d9; }
    .grade-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }

    #count { font-size: 0.78rem; color: #7c6fa0; white-space: nowrap; }
    #updated { font-size: 0.75rem; color: #7c6fa0; white-space: nowrap; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #ddd6fe;
      box-shadow: 0 2px 12px #7c3aed18;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
      background: #fff;
    }

    thead th {
      background: #ede9fe;
      padding: 11px 14px;
      text-align: left;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: #7c6fa0;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #ddd6fe;
    }
    thead th:hover { color: #6d28d9; }
    thead th.asc::after  { content: ' ▲'; color: #7c3aed; }
    thead th.desc::after { content: ' ▼'; color: #7c3aed; }

    tbody tr { border-bottom: 1px solid #f0ebff; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf7ff; }

    tbody td {
      padding: 10px 14px;
      color: #3b2d80;
      vertical-align: top;
      word-break: break-word;
    }

    /* 学年バッジ */
    .grade-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .g1 { background: #dbeafe; color: #1d4ed8; }
    .g2 { background: #d1fae5; color: #065f46; }
    .g3 { background: #ffedd5; color: #c2410c; }
    .g4 { background: #ede9fe; color: #6d28d9; }
    .g5 { background: #fee2e2; color: #b91c1c; }
    .g6 { background: #ccfbf1; color: #0f766e; }

    /* 様子セル */
    .note-cell {
      max-width: 400px;
      font-size: 0.84rem;
      color: #5b4fa0;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* 日付セル */
    .meta-cell { color: #9d8ec0; font-size: 0.75rem; white-space: nowrap; }

    /* 本タイトル */
    .book-cell { color: #d97706; font-weight: 500; }

    /* State */
    #message {
      text-align: center;
      padding: 60px 24px;
      color: #7c6fa0;
      font-size: 0.92rem;
      line-height: 1.9;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #ddd6fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #dc2626; }

    a.back { font-size: 0.82rem; color: #7c6fa0; text-decoration: none; }
    a.back:hover { color: #6d28d9; }

    /* Manual refresh bar */
    #refresh-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #ddd6fe;
      border-radius: 12px;
      padding: 12px 16px;
    }
    #refresh-btn {
      padding: 8px 18px;
      border-radius: 10px;
      border: 1.5px solid #c4b5fd;
      background: #fff;
      color: #7c3aed;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    #refresh-btn:hover { background: #f3f0ff; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #refresh-icon { font-size: 1rem; display: inline-block; }
    #refresh-icon.spinning { animation: spin 0.8s linear infinite; }
    #refresh-status { font-size: 0.78rem; color: #7c6fa0; white-space: nowrap; }

    #fetch-btn {
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    #fetch-btn:hover { background: #6d28d9; }
    #fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #fetch-icon { font-size: 1rem; display: inline-block; }
    #fetch-icon.spinning { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>⭐ 西小 読み聞かせ記録ノート</h1>
    <p>フォームズに送信されたログの一覧</p>
  </div>
  <div class="header-right">
    <a class="form-link" href="https://ws.formzu.net/dist/S950893888/" target="_blank">フォームに記録する</a>
    <a class="back" href="index.html">← トップ</a>
  </div>
</header>

<details id="howto">
  <summary>このページを最新データに更新する方法</summary>
  <ol>
    <li>「<strong>☁ フォームズから取得</strong>」ボタンを押す</li>
    <li>「データ取得中…」と表示されるのでそのまま待つ（最大90秒）</li>
    <li>完了後、「<strong>↻ ページを再読み込み</strong>」ボタンを押すと最新のデータが表示されます</li>
  </ol>
  <div style="margin-top:8px;color:#6b6b9a;font-size:0.78rem;">
    ※ データは1時間ごとにも自動で取得されます。
  </div>
</details>

<!-- Manual refresh bar -->
<div id="refresh-bar">
  <button id="fetch-btn" onclick="triggerFetch()">
    <span id="fetch-icon">☁</span> フォームズから取得
  </button>
  <button id="refresh-btn" onclick="manualRefresh()">
    <span id="refresh-icon">↻</span> ページを再読み込み
  </button>
  <span id="refresh-status"></span>
</div>

<!-- Filter bar -->
<div id="filter-bar">
  <input id="search" type="text" placeholder="本のタイトル・読み手名などで検索…" oninput="render()">
  <button class="grade-btn active" data-grade="all" onclick="setGrade('all')">全学年</button>
  <button class="grade-btn" data-grade="1年生" onclick="setGrade('1年生')">1年生</button>
  <button class="grade-btn" data-grade="2年生" onclick="setGrade('2年生')">2年生</button>
  <button class="grade-btn" data-grade="3年生" onclick="setGrade('3年生')">3年生</button>
  <button class="grade-btn" data-grade="4年生" onclick="setGrade('4年生')">4年生</button>
  <button class="grade-btn" data-grade="5年生" onclick="setGrade('5年生')">5年生</button>
  <button class="grade-btn" data-grade="6年生" onclick="setGrade('6年生')">6年生</button>
  <span id="count"></span>
  <span id="updated"></span>
</div>

<!-- Table -->
<div class="table-wrap">
  <div id="message"><span class="spinner"></span>読み込み中…</div>
  <table id="tbl" style="display:none">
    <thead><tr id="thead-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// --- フォームズの CSV ヘッダーに合わせた列インデックス ---
const COL = {
  time:  0,  // 日付
  name:  1,  // 読み手名
  date:  2,  // 読み聞かせ日
  grade: 3,  // 学　年
  book:  4,  // 本のタイトル
  note:  5,  // 子どもたちの様子
  memo:  6,  // その他　気づいた事やメモなど
};

const GRADE_CLASS = { '1年生':'g1','2年生':'g2','3年生':'g3','4年生':'g4','5年生':'g5','6年生':'g6' };

let allRows = [], headers = [];
let sortCol = -1, sortAsc = true;
let gradeFilter = 'all';
let lastCSVText = '';

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (!lines.length) return { headers: [], rows: [] };
  const parse = line => {
    const cols = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  };
  return { headers: parse(lines[0]), rows: lines.slice(1).map(parse) };
}

async function loadCSV(silent = false) {
  const msg = document.getElementById('message');
  if (!silent) {
    msg.innerHTML = '<span class="spinner"></span>読み込み中…';
    msg.style.display = 'block';
    document.getElementById('tbl').style.display = 'none';
  }

  try {
    const res = await fetch('./logs.csv?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if (silent && text === lastCSVText) return; // 変更なし
    lastCSVText = text;
    const { headers: h, rows: r } = parseCSV(text);
    if (!h.length) throw new Error('CSV が空です');
    const prevCount = allRows.length;
    headers = h;
    allRows = r;
    sortCol = -1;
    document.getElementById('updated').textContent = '更新: ' + new Date().toLocaleString('ja-JP');
    render();
    msg.style.display = 'none';
    document.getElementById('tbl').style.display = '';
    if (silent && allRows.length > prevCount) showNewBanner(allRows.length - prevCount);
  } catch (e) {
    if (!silent) {
      msg.innerHTML =
        `<span class="err">⚠ データを読み込めませんでした（${e.message}）</span><br><br>` +
        `上の手順で <code>logs.csv</code> をリポジトリに追加してください。`;
    }
  }
}

function showNewBanner(n) {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:10px 22px;border-radius:999px;font-size:0.88rem;box-shadow:0 4px 16px #7c3aed44;z-index:999;';
  b.textContent = `✨ ${n}件の新しい記録が追加されました`;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 4000);
}

// 5分ごとに自動チェック
setInterval(() => loadCSV(true), 5 * 60 * 1000);

// タブが再表示されたときも更新
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadCSV(true);
});

function setGrade(g) {
  gradeFilter = g;
  document.querySelectorAll('.grade-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.grade === g);
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = allRows.filter(r => {
    const gradeOk = gradeFilter === 'all' || (r[COL.grade] || '') === gradeFilter;
    const searchOk = !q || r.some(c => c.toLowerCase().includes(q));
    return gradeOk && searchOk;
  });

  if (sortCol >= 0) {
    rows.sort((a, b) => {
      const av = a[sortCol] || '', bv = b[sortCol] || '';
      return sortAsc ? av.localeCompare(bv, 'ja') : bv.localeCompare(av, 'ja');
    });
  } else {
    rows = [...rows].reverse();
  }

  document.getElementById('count').textContent = `${rows.length} 件`;

  // ヘッダー描画
  const tr = document.getElementById('thead-row');
  tr.innerHTML = '';
  headers.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (i === sortCol) th.classList.add(sortAsc ? 'asc' : 'desc');
    th.onclick = () => { sortCol === i ? (sortAsc = !sortAsc) : (sortCol = i, sortAsc = true); render(); };
    tr.appendChild(th);
  });

  // 行描画
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr2 = document.createElement('tr');
    headers.forEach((_, i) => {
      const td = document.createElement('td');
      const val = row[i] ?? '';

      if (i === COL.grade) {
        const badge = document.createElement('span');
        badge.className = 'grade-badge ' + (GRADE_CLASS[val] || '');
        badge.textContent = val;
        td.appendChild(badge);
      } else if (i === COL.book) {
        td.className = 'book-cell';
        td.textContent = val;
      } else if (i === COL.note || i === COL.memo) {
        td.className = 'note-cell';
        td.innerHTML = val.replace(/\[br\]/gi, '<br>');
      } else if (i === COL.time) {
        td.className = 'meta-cell';
        td.textContent = val;
      } else {
        td.textContent = val;
      }

      tr2.appendChild(td);
    });
    tbody.appendChild(tr2);
  });
}

async function triggerFetch() {
  const btn = document.getElementById('fetch-btn');
  const icon = document.getElementById('fetch-icon');
  const status = document.getElementById('refresh-status');
  btn.disabled = true;
  document.getElementById('refresh-btn').disabled = true;
  icon.classList.add('spinning');
  status.textContent = 'フォームズに接続中…';

  try {
    const res = await fetch('https://formzu-trigger.nami761.workers.dev', { method: 'POST' });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'ワークフロー起動失敗');
  } catch (e) {
    icon.classList.remove('spinning');
    btn.disabled = false;
    document.getElementById('refresh-btn').disabled = false;
    status.textContent = '⚠ 失敗しました: ' + e.message;
    return;
  }

  // Poll for CSV changes up to 90 seconds
  status.textContent = 'データ取得中… (最大90秒)';
  const prevText = lastCSVText;
  const deadline = Date.now() + 90000;
  let updated = false;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 5000));
    try {
      const r2 = await fetch('./logs.csv?t=' + Date.now());
      const txt = await r2.text();
      if (txt !== prevText) { updated = true; lastCSVText = txt; break; }
    } catch (_) {}
  }

  icon.classList.remove('spinning');
  btn.disabled = false;
  document.getElementById('refresh-btn').disabled = false;

  if (updated) {
    await loadCSV(true);
    status.textContent = '✨ データを更新しました！ (' + new Date().toLocaleTimeString('ja-JP') + ')';
  } else {
    status.textContent = '変更はありませんでした (' + new Date().toLocaleTimeString('ja-JP') + ')';
  }
}

async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const status = document.getElementById('refresh-status');
  btn.disabled = true;
  icon.classList.add('spinning');
  status.textContent = '確認中…';
  const prev = allRows.length;
  await loadCSV();
  icon.classList.remove('spinning');
  btn.disabled = false;
  if (allRows.length > prev) {
    status.textContent = `✨ ${allRows.length - prev}件の新しい記録が見つかりました！`;
  } else {
    status.textContent = '最新の状態です（' + new Date().toLocaleTimeString('ja-JP') + '）';
  }
}

loadCSV();
</script>
</body>
</html>
