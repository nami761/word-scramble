<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倶知安西小学校 画像ギャラリー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #2b6cb0;
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.95rem;
      color: #718096;
    }

    header a {
      color: #3182ce;
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #e2e8f0;
    }

    .card-body {
      padding: 16px;
    }

    .card-body h2 {
      font-size: 1rem;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 4px;
    }

    .card-body p {
      font-size: 0.85rem;
      color: #718096;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.8rem;
      color: #a0aec0;
    }

    footer a {
      color: #3182ce;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <h1>倶知安西小学校 画像ギャラリー</h1>
  <p>
    倶知安町立西小学校（北海道虻田郡倶知安町）の学校写真コレクション<br>
    公式サイト: <a href="https://nishi-es.kutchan.ed.jp/" target="_blank">nishi-es.kutchan.ed.jp</a>
  </p>
</header>

<div class="gallery">

  <div class="card">
    <img
      src="https://www.town.kutchan.hokkaido.jp/image/contents/909/61390/nishi.jpeg"
      alt="倶知安西小学校 校舎"
      loading="lazy"
    >

  <div class="card">
    <img
      src="https://lh3.googleusercontent.com/sitesv/AA5AbUDn0wtGPqv25YD1SvaM33vEClHEuS5X1652nfx7dSqqa6LJcCu501DZctE7cxqGOcGLumlK_kcrzf9QRyEbh2yGSY38FuvfnNiRfyg2cq1z0aMC_FcrheDahxBGKzP47t7AdMfTCew8P63edOiwknTSoIZdGWhEZp6S20H9QDF6-Tgr4Kf2rYQO10MhbKO5kNWV2xLqmNRSGvPZdBjhnQidvLtrlxPmPRQ4qNEXJw4=w1280"

      alt="倶知安西小学校 校章"
