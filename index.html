<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Scramble</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.2em;
      color: #a78bfa;
      text-shadow: 0 0 20px #7c3aed88;
    }

    #lang-toggle {
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      padding: 6px 18px;
      border-radius: 999px;
      border: 2px solid #4f46e5;
      background: transparent;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #4f46e5;
      color: #fff;
    }

    #stats {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat span:first-child { font-size: 0.7rem; letter-spacing: 0.15em; color: #6b6b9a; text-transform: uppercase; }
    .stat span:last-child { font-size: 1.5rem; font-weight: bold; color: #c4b5fd; }

    #timer.danger { color: #f87171 !important; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

    #game-box {
      background: #1a1a2e;
      border: 1px solid #2d2d5a;
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      min-width: 340px;
      max-width: 480px;
      width: 100%;
    }

    #hint { font-size: 0.85rem; color: #6b6b9a; letter-spacing: 0.05em; min-height: 1.2em; }

    #scrambled {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .letter-tile {
      width: 48px;
      height: 56px;
      background: #252545;
      border: 2px solid #3d3d7a;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      color: #e0e0ff;
      transition: transform 0.15s;
      animation: drop-in 0.3s ease backwards;
    }
    @keyframes drop-in {
      from { transform: translateY(-20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #answer-area {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 56px;
    }

    .slot {
      width: 48px;
      height: 56px;
      border-bottom: 3px solid #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      color: #a78bfa;
    }

    #input-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    #answer-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      border: 2px solid #3d3d7a;
      background: #0f0f1a;
      color: #e0e0ff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #answer-input:focus { border-color: #7c3aed; }
    #answer-input.correct { border-color: #34d399; background: #0d2a1f; }
    #answer-input.wrong   { border-color: #f87171; background: #2a0d0d; animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    #submit-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #submit-btn:hover { background: #6d64f5; }

    #feedback {
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 1.4em;
      transition: color 0.3s;
    }
    #feedback.good { color: #34d399; }
    #feedback.bad  { color: #f87171; }

    #action-row { display: flex; gap: 12px; }

    .action-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #3d3d7a;
      background: transparent;
      color: #a78bfa;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .action-btn:hover { background: #2d2d5a; }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f1aee;
      align-items: center;
      justify-content: center;
    }
    #overlay.show { display: flex; }

    #result-box {
      background: #1a1a2e;
      border: 1px solid #4f46e5;
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    #result-box h2 { font-size: 2rem; color: #a78bfa; }
    #result-box p  { color: #c4b5fd; font-size: 1.1rem; }

    #play-again {
      padding: 12px 32px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    #play-again:hover { background: #6d64f5; }
  </style>
</head>
<body>

<h1>WORD SCRAMBLE</h1>

<div id="lang-toggle">
  <button class="lang-btn active" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('ja')">日本語</button>
</div>

<div id="stats">
  <div class="stat"><span>スコア</span><span id="score">0</span></div>
  <div class="stat"><span>問題</span><span id="q-num">1 / 10</span></div>
  <div class="stat"><span>タイマー</span><span id="timer">15</span></div>
</div>

<div id="game-box">
  <div id="hint"></div>
  <div id="scrambled"></div>
  <div id="answer-area"></div>
  <div id="input-row">
    <input id="answer-input" type="text" placeholder="答えを入力..." autocomplete="off" spellcheck="false">
    <button id="submit-btn" onclick="submitAnswer()">OK</button>
  </div>
  <div id="feedback"></div>
  <div id="action-row">
    <button class="action-btn" onclick="skipWord()">スキップ</button>
    <button class="action-btn" onclick="showHintLetter()">ヒント (-5pt)</button>
  </div>
</div>

<div id="overlay">
  <div id="result-box">
    <h2 id="result-title"></h2>
    <p id="result-score"></p>
    <p id="result-correct"></p>
    <button id="play-again" onclick="startGame()">もう一度</button>
  </div>
</div>

<script>
const WORDS = {
  en: [
    { word: "elephant",  hint: "Large animal with a trunk" },
    { word: "umbrella",  hint: "Keeps you dry in the rain" },
    { word: "diamond",   hint: "Precious gemstone" },
    { word: "volcano",   hint: "Mountain that erupts" },
    { word: "keyboard",  hint: "You type on this" },
    { word: "dolphin",   hint: "Smart ocean mammal" },
    { word: "library",   hint: "Borrow books here" },
    { word: "penguin",   hint: "Black-and-white bird" },
    { word: "treasure",  hint: "Hidden riches" },
    { word: "spaghetti", hint: "Italian pasta dish" },
    { word: "mystery",   hint: "An unsolved puzzle" },
    { word: "cactus",    hint: "Desert plant with spines" },
    { word: "gravity",   hint: "What keeps you on Earth" },
    { word: "octopus",   hint: "Eight-armed sea creature" },
    { word: "journal",   hint: "A personal diary" },
  ],
  ja: [
    { word: "さくら",     hint: "春に咲く花" },
    { word: "でんしゃ",   hint: "レールの上を走る乗り物" },
    { word: "たいよう",   hint: "空で一番明るいもの" },
    { word: "りんご",     hint: "赤い果物" },
    { word: "かみなり",   hint: "嵐のときに光る現象" },
    { word: "にじ",       hint: "雨上がりに見える" },
    { word: "うちゅう",   hint: "星や惑星がある広大な空間" },
    { word: "とけい",     hint: "時間を表示するもの" },
    { word: "きりん",     hint: "首が長い動物" },
    { word: "おかし",     hint: "甘くておいしい食べ物" },
    { word: "ひこうき",   hint: "空を飛ぶ乗り物" },
    { word: "えんぴつ",   hint: "書くための文房具" },
    { word: "すいか",     hint: "夏の緑と赤の果物" },
    { word: "やきゅう",   hint: "バットとボールのスポーツ" },
    { word: "まほう",     hint: "不思議な力" },
  ]
};

const TOTAL = 10;
const TIME_LIMIT = 15;

let lang = 'en';
let queue = [];
let current = null;
let questionIndex = 0;
let score = 0;
let correctCount = 0;
let timeLeft = TIME_LIMIT;
let timerInterval = null;
let hintRevealed = 0;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l === 'en' ? 'English' : '日本語')));
  startGame();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function scrambleWord(word) {
  const chars = [...word];
  let scrambled;
  let attempts = 0;
  do {
    scrambled = shuffle(chars).join('');
    attempts++;
  } while (scrambled === word && attempts < 20);
  return scrambled;
}

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  clearInterval(timerInterval);
  score = 0;
  correctCount = 0;
  questionIndex = 0;
  queue = shuffle(WORDS[lang]).slice(0, TOTAL);
  loadQuestion();
}

function loadQuestion() {
  if (questionIndex >= TOTAL) { endGame(); return; }
  current = queue[questionIndex];
  hintRevealed = 0;

  const scrambled = scrambleWord(current.word);
  document.getElementById('hint').textContent = `ヒント: ${current.hint}`;
  document.getElementById('q-num').textContent = `${questionIndex + 1} / ${TOTAL}`;
  document.getElementById('score').textContent = score;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = '';

  // Render scrambled tiles
  const sc = document.getElementById('scrambled');
  sc.innerHTML = '';
  [...scrambled].forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'letter-tile';
    div.textContent = ch;
    div.style.animationDelay = `${i * 40}ms`;
    sc.appendChild(div);
  });

  // Render answer slots
  const aa = document.getElementById('answer-area');
  aa.innerHTML = '';
  [...current.word].forEach(() => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    aa.appendChild(slot);
  });

  // Mirror typing to slots
  const input = document.getElementById('answer-input');
  input.oninput = () => {
    const val = [...input.value];
    document.querySelectorAll('.slot').forEach((s, i) => {
      s.textContent = val[i] || '';
    });
  };
  input.focus();

  resetTimer();
}

function resetTimer() {
  clearInterval(timerInterval);
  timeLeft = TIME_LIMIT;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showFeedback(`時間切れ！正解は「${current.word}」`, 'bad');
      setTimeout(nextQuestion, 1400);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer');
  el.textContent = timeLeft;
  el.classList.toggle('danger', timeLeft <= 5);
}

function submitAnswer() {
  const val = document.getElementById('answer-input').value.trim().toLowerCase();
  if (!val) return;
  clearInterval(timerInterval);

  if (val === current.word) {
    const pts = Math.max(10, timeLeft * 10 - hintRevealed * 5);
    score += pts;
    correctCount++;
    document.getElementById('answer-input').className = 'correct';
    showFeedback(`正解！ +${pts}pt`, 'good');
    setTimeout(nextQuestion, 900);
  } else {
    document.getElementById('answer-input').className = 'wrong';
    showFeedback('不正解… もう一度！', 'bad');
    setTimeout(() => {
      document.getElementById('answer-input').className = '';
      document.getElementById('answer-input').value = '';
      document.querySelectorAll('.slot').forEach(s => s.textContent = '');
      resetTimer();
    }, 600);
  }
}

function nextQuestion() {
  questionIndex++;
  loadQuestion();
}

function skipWord() {
  clearInterval(timerInterval);
  showFeedback(`スキップ。正解は「${current.word}」`, 'bad');
  setTimeout(nextQuestion, 1200);
}

function showHintLetter() {
  const slots = document.querySelectorAll('.slot');
  const word = current.word;
  // Find first unrevealed slot
  for (let i = 0; i < word.length; i++) {
    if (!slots[i].dataset.locked) {
      slots[i].textContent = word[i];
      slots[i].dataset.locked = '1';
      slots[i].style.color = '#fbbf24';
      hintRevealed++;
      // Also put it in input
      const input = document.getElementById('answer-input');
      const chars = [...input.value.padEnd(word.length, '')];
      chars[i] = word[i];
      input.value = chars.slice(0, word.length).join('').replace(/ /g, '');
      break;
    }
  }
}

function showFeedback(msg, cls) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = cls;
}

function endGame() {
  clearInterval(timerInterval);
  const pct = Math.round((correctCount / TOTAL) * 100);
  let title = pct === 100 ? '完璧！🎉' : pct >= 70 ? 'よくできました！' : 'もう一度挑戦！';
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `スコア: ${score} pt`;
  document.getElementById('result-correct').textContent = `正解: ${correctCount} / ${TOTAL} 問`;
  document.getElementById('overlay').classList.add('show');
}

// Enter key submits
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

startGame();
</script>
</body>
</html>
